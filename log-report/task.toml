artifacts = ["/app/report.json"]

[task]
name = "dynamo/log-report"
description = "Parse an Apache-style access log into a small JSON summary report."

[metadata]
category = "data_processing_and_etl"
subcategory = "text_processing"
task_objective = ["transform", "generate"]
artifact_type = ["text_or_log_file", "generated_output_artifact"]
expert_time_estimate_hours = 0.3
model_tested = "GPT-5.4"
agent_tested = "Terminus-2"
difficulty_explanation = "Straightforward log-parsing exercise: read a fixed Apache-style access log, aggregate the request count, distinct client IPs, and most-requested path, and emit them in an exact JSON format. Easy for an expert; the work is careful parsing and matching the specified output schema."
solution_explanation = "Read /app/access.log line by line, count each line as one request, collect the first field of each line into a set of client IPs, extract the request path from the quoted request field with a regex, tally per-path frequencies, and write total_requests, unique_ips, and top_path to /app/report.json."
verification_explanation = "pytest asserts the actual content of /app/report.json against ground-truth values derived from the fixed input log: the file must contain a single JSON object with exactly the keys total_requests, unique_ips, and top_path, and their values must equal the true request count (6), distinct-IP count (3), and most-requested path (/index.html). Each test maps 1:1 to a numbered success criterion in instruction.md. test.sh writes the reward (1/0) to /logs/verifier/reward.txt and the CTRF report to /logs/verifier/ctrf.json."

[verifier]
timeout_sec = 120.0

[agent]
timeout_sec = 120.0

[environment]
build_timeout_sec = 600.0
cpus = 1
memory_mb = 2048
storage_mb = 10240
gpus = 0
allow_internet = true
mcp_servers = []
